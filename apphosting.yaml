# App Hosting Configuration for Field Trip (Beta)

runtime: nodejs20

# Environment Variables
env:
  - variable: VITE_BETA_INVITE_ONLY
    value: "true"
  - variable: VITE_FIREBASE_APP_CHECK_DEBUG
    value: "false"
  - variable: FIREBASE_PROJECT_ID
    value: "field-trip-495823"
  - variable: FIRESTORE_DATABASE_ID
    value: "ai-studio-6bdf91b5-28e9-46f3-ae49-89cf99e2d88a"

# Secrets
# Configure these in Firebase Console under App Hosting -> Secrets
# or via CLI: firebase apphosting:secrets:set <secret-name>
secrets:
  - variable: GEMINI_API_KEY
    secret: gemini_api_key
  - variable: VITE_RECAPTCHA_SITE_KEY
    secret: recaptcha_site_key

# Build Settings
build:
  buildCommand: npm run build
  outputDirectory: dist

# Run Settings
run:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
